<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Antenna -->
  <circle cx="32" cy="7" r="4" fill="#20808d"/>
  <line x1="32" y1="10" x2="32" y2="14" stroke="#20808d" stroke-width="3" stroke-linecap="round"/>
  <!-- Face — identical to icon-main.svg -->
  <rect x="6" y="14" width="52" height="38" rx="10" fill="none" stroke="#20808d" stroke-width="3"/>
  <!-- Eyes with lighter highlight dot -->
  <circle cx="22" cy="36" r="4" fill="#20808d"/>
  <circle cx="24" cy="34" r="1.2" fill="#5ab3bc"/>
  <circle cx="42" cy="36" r="4" fill="#20808d"/>
  <circle cx="44" cy="34" r="1.2" fill="#5ab3bc"/>
  <!-- Nose -->
  <rect x="30" y="34" width="4" height="4" rx="1" fill="#20808d"/>
  <!-- Sparkle crosses — inset from edges to avoid clipping -->
  <line x1="6"  y1="6"  x2="6"  y2="12" stroke="#20808d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3"  y1="9"  x2="9"  y2="9"  stroke="#20808d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="6"  x2="58" y2="12" stroke="#20808d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="9"  x2="61" y2="9"  stroke="#20808d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="6"  y1="55" x2="6"  y2="61" stroke="#20808d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="3"  y1="58" x2="9"  y2="58" stroke="#20808d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="58" y1="55" x2="58" y2="61" stroke="#20808d" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="55" y1="58" x2="61" y2="58" stroke="#20808d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Small sparkle crosses -->
  <line x1="13" y1="3"  x2="13" y2="7"  stroke="#5ab3bc" stroke-width="1" stroke-linecap="round"/>
  <line x1="11" y1="5"  x2="15" y2="5"  stroke="#5ab3bc" stroke-width="1" stroke-linecap="round"/>
  <line x1="51" y1="3"  x2="51" y2="7"  stroke="#5ab3bc" stroke-width="1" stroke-linecap="round"/>
  <line x1="49" y1="5"  x2="53" y2="5"  stroke="#5ab3bc" stroke-width="1" stroke-linecap="round"/>
  <line x1="13" y1="55" x2="13" y2="59" stroke="#5ab3bc" stroke-width="1" stroke-linecap="round"/>
  <line x1="11" y1="57" x2="15" y2="57" stroke="#5ab3bc" stroke-width="1" stroke-linecap="round"/>
  <line x1="51" y1="55" x2="51" y2="59" stroke="#5ab3bc" stroke-width="1" stroke-linecap="round"/>
  <line x1="49" y1="57" x2="53" y2="57" stroke="#5ab3bc" stroke-width="1" stroke-linecap="round"/>
</svg>
